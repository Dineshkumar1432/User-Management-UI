
<div>
  <h2>Login</h2>

  <input [value]="loginData.usernameOrEmail" (input)="loginData.usernameOrEmail = $event.target.value" placeholder="Username" />
  <input [value]="loginData.password" type="password" (input)="loginData.password = $event.target.value" placeholder="Password" />

  <button type="button" (click)="login()" [disabled]="loading">
    {{ loading ? 'Signing in…' : 'Login' }}
  </button>

  <p>
    Don't have an account? <a routerLink="/register">Register</a>
  </p>

  <div *ngIf="errorMessage" class="login-error">
    {{ errorMessage }}
  </div>
</div>
