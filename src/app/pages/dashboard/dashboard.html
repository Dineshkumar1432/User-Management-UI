<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Dashboard</h2>

    <div class="right-section">
      <p-tag [value]="role"></p-tag>
      <button pButton label="Logout" icon="pi pi-sign-out"
        class="p-button-danger" (click)="logout()">
      </button>
    </div>
  </div>

  <!-- USER PROFILE -->
  <p-card *ngIf="role === 'USER' && user" header="Profile">

    <p><strong>ID:</strong> {{ user?.id }}</p>
    <p><strong>Name:</strong> {{ user?.name }}</p>
    <p><strong>Username:</strong> {{ user?.username }}</p>

    <button pButton label="Edit Profile"
      icon="pi pi-user-edit"
      (click)="startEditUser()">
    </button>

  </p-card>

  <!-- EDIT DIALOG -->
  <p-dialog header="Edit Profile"
            [(visible)]="showEditForm"
            *ngIf="editingUser">

    <input pInputText [(ngModel)]="editingUser.name" placeholder="Name" />
    <br><br>

    <input pInputText [(ngModel)]="editingUser.username" placeholder="Username" />

    <br><br>
    <button pButton label="Save"
      (click)="updateUserDetails()">
    </button>

  </p-dialog>

  <!-- ORDERS -->
  <p-card *ngIf="role === 'USER'" header="My Orders">

    <button pButton label="Add Order"
      icon="pi pi-plus"
      (click)="startAddOrder()">
    </button>

    <p-table [value]="orders">
      <ng-template pTemplate="header">
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-order>
        <tr>
          <td>{{ order.product }}</td>
          <td>₹{{ order.price }}</td>
          <td>
            <button pButton
              icon="pi pi-trash"
              class="p-button-danger"
              (click)="deleteOrder(order.id)">
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>

  </p-card>

  <!-- ADD ORDER -->
  <p-dialog header="Add Order"
            [(visible)]="showAddOrderForm">

    <input pInputText [(ngModel)]="newOrder.product" placeholder="Product" />
    <br><br>

    <input pInputText type="number"
      [(ngModel)]="newOrder.price"
      placeholder="Price" />

    <br><br>
    <button pButton label="Add"
      (click)="addOrder()">
    </button>

  </p-dialog>

  <!-- ADMIN USERS -->
  <p-card *ngIf="role.includes('ADMIN')" header="Users">

    <p-table [value]="users">

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Username</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-u>
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.name }}</td>
          <td>{{ u.username }}</td>
          <td><p-tag [value]="u.role"></p-tag></td>
          <td>
            <button pButton label="Orders"
              (click)="viewOrders(u)">
            </button>

            <button pButton
              icon="pi pi-trash"
              class="p-button-danger"
              (click)="deleteUser(u.id)">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>

  </p-card>

  <!-- ADMIN ORDERS -->
  <p-dialog header="User Orders"
            [(visible)]="showAdminOrders">

    <p-table [value]="selectedOrders">

      <ng-template pTemplate="body" let-order>
        <tr>
          <td>{{ order.product }}</td>
          <td>{{ order.price }}</td>
          <td>
            <button pButton
              icon="pi pi-trash"
              (click)="deleteOrderForAdmin(order.id)">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>

  </p-dialog>

</div>
